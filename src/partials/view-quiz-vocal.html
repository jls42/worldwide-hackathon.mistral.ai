<!-- ======================== QUIZ VOCAL ======================== -->
<div x-show="activeView === 'quiz-vocal'">
  <div class="flex items-center justify-between mb-4">
    <h2 class="font-heading font-bold text-xl title-gradient" x-text="t('nav.quiz-vocal')">
      Vocal Quiz
    </h2>
    <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
    <button
      @click="generate('quiz-vocal')"
      :disabled="loading['quiz-vocal'] || sources.length === 0 || !apiStatus.elevenlabs"
      :title="!apiStatus.elevenlabs ? t('gen.needsElevenLabs') : ''"
      class="px-4 min-h-touch rounded-button font-semibold text-body-sm flex items-center gap-2 btn-lift focus-ring bg-gen-quizvocal/10 text-gen-quizvocal hover:bg-gen-quizvocal/20 disabled:opacity-50"
    >
      <i x-show="!loading['quiz-vocal']" data-lucide="mic" class="w-4 h-4"></i>
      <span
        x-show="loading['quiz-vocal']"
        class="w-4 h-4 animate-spin rounded-full border-2 border-gen-quizvocal border-t-transparent"
      ></span>
      <span x-text="t('gen.quiz-vocal')"></span>
    </button>
  </div>

  <!-- Empty state -->
  <div
    x-show="generationsByType('quiz-vocal').length === 0 && !loading['quiz-vocal']"
    class="text-center py-12"
  >
    <div
      class="w-16 h-16 mx-auto mb-3 bg-gen-quizvocal/10 rounded-[1rem] flex items-center justify-center"
    >
      <i data-lucide="mic" class="w-8 h-8 text-gen-quizvocal"></i>
    </div>
    <p class="text-text-primary font-semibold mb-1" x-text="t('quiz.emptyVocalTitle')"></p>
    <p class="text-text-secondary text-body-sm" x-text="t('quiz.emptyVocalSubtitle')"></p>
  </div>

  <!-- Quiz vocal cards -->
  <template x-for="gen in generationsByType('quiz-vocal')" :key="gen.id">
    <div class="gen-card border-l-4 border-l-gen-quizvocal animate-slide-up mt-3">
      <button
        @click="toggleGen(gen.id)"
        class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors focus-ring text-left"
      >
        <span class="icon-chip icon-chip-quizvocal shrink-0"
          ><i data-lucide="mic" class="w-4 h-4 text-gen-quizvocal"></i
        ></span>
        <div class="flex-1 min-w-0">
          <span
            class="font-semibold text-body-sm text-text-primary truncate block"
            x-text="gen.title"
          ></span>
          <span
            class="text-sm text-text-secondary"
            x-text="new Date(gen.createdAt).toLocaleTimeString(dateLocale())"
          ></span>
        </div>
        <i
          data-lucide="chevron-down"
          class="w-5 h-5 text-text-secondary shrink-0 transition-transform"
          :class="openGens[gen.id] && 'rotate-180'"
        ></i>
      </button>
      <div x-show="openGens[gen.id]" x-transition class="px-4 pb-4 border-t border-gray-100">
        <div class="flex items-center gap-2 mt-3 mb-3 flex-wrap">
          <div class="flex-1"></div>
          <button
            @click.stop="confirmDelete('generation', () => deleteGen(gen))"
            class="min-w-[32px] min-h-[32px] flex items-center justify-center text-text-secondary hover:text-danger focus-ring rounded"
            :aria-label="t('common.delete')"
          >
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        </div>
        <div
          x-data="quizVocalComponent(gen)"
          x-init="$watch(() => openGens[gen.id], (open) => { if (open && !finished && !audioPlaying) $nextTick(() => playQuestion()) })"
        >
          <template x-if="!finished">
            <div>
              <div class="flex items-center gap-2 mb-3">
                <span
                  class="text-body-sm font-semibold text-gen-quizvocal"
                  x-text="t('quiz.questionOf', { current: currentQ + 1, total: questions().length })"
                ></span>
                <span
                  class="text-sm bg-gen-quizvocal/10 text-gen-quizvocal px-2.5 py-1 rounded-badge font-semibold"
                  x-text="t('quiz.score', { score: score })"
                ></span>
              </div>
              <div class="bg-gray-50 rounded-card p-4 mb-4">
                <p
                  class="font-heading font-semibold text-body-sm mb-2 text-text-primary"
                  x-text="questions()[currentQ]?.question"
                ></p>
                <div class="text-sm text-text-secondary space-y-0.5">
                  <template x-for="(c, ci) in questions()[currentQ]?.choices || []" :key="ci"
                    ><p x-text="c"></p
                  ></template>
                </div>
              </div>
              <div class="flex items-center gap-3 mb-4">
                <button
                  @click="playQuestion()"
                  :disabled="audioPlaying"
                  class="min-h-touch px-4 rounded-button font-semibold text-body-sm flex items-center gap-2 bg-gen-quizvocal/10 text-gen-quizvocal hover:bg-gen-quizvocal/20 disabled:opacity-50 btn-press focus-ring"
                >
                  <i data-lucide="play" class="w-5 h-5"></i>
                  <span x-show="!audioPlaying" x-text="t('quiz.listen')"></span>
                  <span
                    x-show="audioPlaying"
                    class="animate-pulse"
                    x-text="t('quiz.listening')"
                  ></span>
                </button>
              </div>
              <template x-if="!feedback">
                <button
                  @click="vocalRecording ? stopVocalRecording() : startVocalRecording()"
                  class="w-full min-h-[80px] rounded-card font-bold text-lg flex items-center justify-center gap-3 btn-press focus-ring transition-colors"
                  :class="vocalRecording ? 'bg-danger text-white animate-pulse' : 'bg-gray-100 text-text-primary hover:bg-gray-200'"
                >
                  <i data-lucide="mic" class="w-8 h-8"></i>
                  <span x-text="vocalRecording ? t('quiz.stop') : t('quiz.answerMic')"></span>
                </button>
              </template>
              <template x-if="feedback">
                <div class="mt-3">
                  <div
                    x-show="feedback.loading"
                    class="flex items-center justify-center gap-2 py-4 text-text-secondary"
                  >
                    <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
                    <span x-text="t('quiz.checking')"></span>
                  </div>
                  <div
                    x-show="!feedback.loading"
                    class="p-4 rounded-card"
                    :class="feedback.correct ? 'bg-success-light border-2 border-success' : 'bg-danger-light border-2 border-danger'"
                  >
                    <p
                      class="font-heading font-bold text-body-sm"
                      :class="feedback.correct ? 'text-success-dark' : 'text-danger-dark'"
                      x-text="feedback.correct ? t('quiz.correct') : t('quiz.incorrect')"
                    ></p>
                    <p class="text-body-sm mt-1 text-text-primary" x-text="feedback.feedback"></p>
                    <p
                      x-show="feedback.transcription"
                      class="text-sm text-text-secondary mt-1"
                      x-text="t('quiz.youSaid', { text: feedback.transcription })"
                    ></p>
                    <button
                      @click="nextQuestion()"
                      class="mt-3 bg-primary-dark text-white px-5 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring"
                      x-text="t('quiz.nextQuestion')"
                    ></button>
                  </div>
                </div>
              </template>
            </div>
          </template>
          <template x-if="finished">
            <div class="text-center py-8">
              <p
                class="font-heading font-bold text-3xl mb-2"
                :class="score === questions().length ? 'text-success-dark' : 'text-warning-dark'"
                x-text="score + '/' + questions().length"
              ></p>
              <p
                class="text-text-primary text-body-sm mb-4"
                x-text="score === questions().length ? t('quiz.perfect') : t('quiz.keepGoing')"
              ></p>
              <button
                @click="resetVocalQuiz()"
                class="bg-gen-quizvocal text-white px-6 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring"
                x-text="t('quiz.restart')"
              ></button>
            </div>
          </template>
        </div>
        <div
          x-show="gen.sourceIds && gen.sourceIds.length > 0"
          class="flex flex-wrap items-center gap-2 mt-3 pt-3 border-t border-gray-100"
        >
          <span class="text-sm text-text-secondary flex items-center gap-1">
            <i data-lucide="book-open" class="w-3.5 h-3.5"></i>
            <span x-text="t('common.sources') + ' :'"></span>
          </span>
          <template x-for="(src, srcIdx) in genSources(gen)" :key="src.id">
            <button
              @click.stop="openSourceDialog(src)"
              :class="['source-badge', !isSourceReferenced(gen, srcIdx) && 'source-badge-dim']"
              :title="src.filename"
              x-text="srcIdx + 1"
            ></button>
          </template>
        </div>
      </div>
    </div>
  </template>
</div>
