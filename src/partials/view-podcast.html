<!-- ======================== PODCAST ======================== -->
<div x-show="activeView === 'podcast'">
  <div class="flex items-center justify-between mb-4">
    <h2 class="font-heading font-bold text-xl title-gradient" x-text="t('podcast.heading')">
      Podcasts
    </h2>
    <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
    <button
      @click="generate('podcast')"
      :disabled="loading.podcast || sources.length === 0 || !apiStatus.elevenlabs"
      class="px-4 min-h-touch rounded-button font-semibold text-body-sm flex items-center gap-2 btn-lift focus-ring bg-gen-podcast/10 text-gen-podcast hover:bg-gen-podcast/20 disabled:opacity-50"
    >
      <i x-show="!loading.podcast" data-lucide="plus" class="w-4 h-4"></i>
      <span
        x-show="loading.podcast"
        class="w-4 h-4 animate-spin rounded-full border-2 border-gen-podcast border-t-transparent"
      ></span>
      <span x-text="loading.podcast ? t('common.loading') : t('podcast.new')"></span>
    </button>
  </div>

  <div
    x-show="generationsByType('podcast').length === 0 && !loading.podcast"
    class="text-center py-12"
  >
    <div
      class="w-16 h-16 mx-auto mb-3 bg-teal-50 rounded-[1rem] border border-gen-podcast/20 flex items-center justify-center"
    >
      <i data-lucide="headphones" class="w-8 h-8 text-gen-podcast"></i>
    </div>
    <p class="text-text-primary font-semibold mb-1" x-text="t('podcast.emptyTitle')"></p>
    <p
      class="text-text-secondary text-body-sm mb-4"
      x-text="sources.length === 0 ? t('common.noSourcesYet') : t('podcast.emptyWithSources')"
    ></p>
    <button
      x-show="sources.length === 0"
      @click="goToView('sources')"
      class="bg-accent text-white px-5 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring"
      x-text="t('common.addSources')"
    ></button>
    <p
      x-show="!apiStatus.elevenlabs"
      class="text-text-secondary text-body-sm mt-2"
      x-text="t('podcast.noElevenLabs')"
    ></p>
  </div>

  <div class="space-y-3">
    <template x-for="gen in generationsByType('podcast')" :key="gen.id">
      <div class="gen-card border-l-4 border-l-gen-podcast animate-slide-up">
        <button
          @click="toggleGen(gen.id)"
          class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors focus-ring text-left"
          :aria-expanded="openGens[gen.id] ? 'true' : 'false'"
        >
          <span class="icon-chip icon-chip-podcast shrink-0"
            ><i data-lucide="headphones" class="w-4 h-4 text-gen-podcast"></i
          ></span>
          <div class="flex-1 min-w-0">
            <template x-if="editingTitle !== gen.id">
              <span
                class="font-semibold text-body-sm text-text-primary truncate block"
                x-text="gen.title"
                @dblclick.stop="startEditTitle(gen)"
              ></span>
            </template>
            <template x-if="editingTitle === gen.id">
              <input
                x-model="editTitleValue"
                @click.stop
                @keydown.enter="saveTitle(gen)"
                @keydown.escape="editingTitle = null"
                @blur="saveTitle(gen)"
                class="w-full border-2 border-primary rounded-button px-2 py-0.5 text-body-sm focus-ring"
                x-ref="titleInput"
              />
            </template>
            <span
              class="text-sm text-text-secondary"
              x-text="new Date(gen.createdAt).toLocaleTimeString(dateLocale())"
            ></span>
          </div>
          <i
            data-lucide="chevron-down"
            class="w-5 h-5 text-text-secondary shrink-0 transition-transform"
            :class="openGens[gen.id] && 'rotate-180'"
          ></i>
        </button>
        <div x-show="openGens[gen.id]" x-transition class="px-4 pb-4 border-t border-gray-100">
          <div class="flex items-center gap-2 mt-3 mb-3 flex-wrap">
            <div class="flex-1"></div>
            <button
              @click.stop="startEditTitle(gen)"
              class="min-w-[32px] min-h-[32px] flex items-center justify-center text-text-secondary hover:text-primary focus-ring rounded"
              :aria-label="t('common.rename')"
            >
              <i data-lucide="pencil" class="w-4 h-4"></i>
            </button>
            <button
              @click.stop="confirmDelete('generation', () => deleteGen(gen))"
              class="min-w-[32px] min-h-[32px] flex items-center justify-center text-text-secondary hover:text-danger focus-ring rounded"
              :aria-label="t('common.delete')"
            >
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
          <!-- Podcast player + script -->
          <div x-show="gen.data.audioUrl" class="mb-4">
            <audio controls class="w-full" :src="gen.data.audioUrl"></audio>
          </div>
          <button
            @click="gen._scriptOpen = !gen._scriptOpen"
            class="flex items-center gap-2 mb-3 cursor-pointer group"
          >
            <i
              data-lucide="chevron-right"
              class="w-4 h-4 text-text-secondary transition-transform"
              :class="gen._scriptOpen && 'rotate-90'"
            ></i>
            <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
            <h4
              class="font-heading font-semibold text-sm text-text-primary group-hover:text-gen-podcast transition-colors"
              x-text="t('podcast.script')"
            >
              Script
            </h4>
            <span
              class="text-text-secondary text-xs"
              x-text="t('podcast.lines', { count: (gen.data.script || []).length })"
            ></span>
          </button>
          <div x-show="gen._scriptOpen" x-transition class="space-y-2">
            <template x-for="(line, li) in gen.data.script || []" :key="li">
              <div class="flex gap-3 items-start">
                <span
                  class="shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold"
                  :class="line.speaker === 'host' ? 'bg-gen-podcast' : 'bg-accent'"
                  x-text="line.speaker === 'host' ? 'A' : 'Z'"
                ></span>
                <div
                  class="flex-1 p-3 rounded-card text-body-sm"
                  :class="line.speaker === 'host' ? 'bg-gen-podcast/10' : 'bg-accent-light'"
                  x-text="line.text"
                ></div>
              </div>
            </template>
          </div>
          <!-- Ref. sources -->
          <div
            x-show="gen.sourceIds && gen.sourceIds.length > 0"
            class="flex flex-wrap items-center gap-2 mt-3 pt-3 border-t border-gray-100"
          >
            <span class="text-sm text-text-secondary flex items-center gap-1">
              <i data-lucide="book-open" class="w-3.5 h-3.5"></i>
              <span x-text="t('common.sources') + ' :'"></span>
            </span>
            <template x-for="(src, srcIdx) in genSources(gen)" :key="src.id">
              <button
                @click.stop="openSourceDialog(src)"
                :class="['source-badge', !isSourceReferenced(gen, srcIdx) && 'source-badge-dim']"
                :title="src.filename"
                x-text="srcIdx + 1"
              ></button>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>
</div>
