<!-- ======================== CHAT ======================== -->
<div x-show="activeView === 'chat'">
  <!-- Age restriction message -->
  <div x-show="currentProfile && !currentProfile.chatEnabled" class="text-center py-16">
    <div
      class="w-16 h-16 mx-auto mb-3 bg-amber-50 rounded-[1rem] border border-amber-200 flex items-center justify-center"
    >
      <i data-lucide="shield-alert" class="w-8 h-8 text-amber-500"></i>
    </div>
    <p class="text-text-primary font-semibold mb-1" x-text="t('chat.ageRestricted')"></p>
    <p class="text-text-secondary text-body-sm" x-text="t('chat.ageRestrictedTooltip')"></p>
  </div>

  <template x-if="!currentProfile || currentProfile.chatEnabled !== false">
    <div>
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-heading font-bold text-xl title-gradient" x-text="t('chat.heading')">
          Chat
        </h2>
        <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
        <button
          x-show="chatMessages.length > 0"
          @click="clearChat()"
          class="px-3 min-h-touch rounded-button font-semibold text-body-sm flex items-center gap-1.5 text-text-secondary hover:bg-gray-100 focus-ring"
        >
          <i data-lucide="trash-2" class="w-4 h-4"></i>
          <span x-text="t('chat.clear')"></span>
        </button>
      </div>

      <!-- Empty state -->
      <div x-show="sources.length === 0" class="text-center py-12">
        <div
          class="w-16 h-16 mx-auto mb-3 bg-primary-light rounded-[1rem] border border-primary/20 flex items-center justify-center"
        >
          <i data-lucide="message-circle" class="w-8 h-8 text-primary"></i>
        </div>
        <p class="text-text-primary font-semibold mb-1" x-text="t('chat.noSourcesTitle')"></p>
        <p class="text-text-secondary text-body-sm" x-text="t('chat.noSourcesSubtitle')"></p>
      </div>

      <template x-if="sources.length > 0">
        <div class="pb-24">
          <!-- Welcome message -->
          <div x-show="chatMessages.length === 0" class="text-center py-8">
            <div
              class="w-14 h-14 mx-auto mb-3 bg-primary-light rounded-[1rem] border border-primary/20 flex items-center justify-center"
            >
              <i data-lucide="sparkles" class="w-7 h-7 text-primary"></i>
            </div>
            <p
              class="font-heading font-bold text-text-primary mb-1"
              x-text="t('chat.welcomeTitle')"
            ></p>
            <p class="text-text-secondary text-body-sm mb-4" x-text="t('chat.welcomeSubtitle')"></p>
            <div class="flex flex-wrap gap-2 justify-center">
              <button
                @click="chatInput = t('chat.quickExplainMsg'); sendChatMessage()"
                class="px-3 py-2 bg-white rounded-button shadow-card text-sm font-medium text-primary hover:bg-primary-light transition-colors"
                x-text="t('chat.quickExplain')"
              ></button>
              <button
                @click="chatInput = t('chat.quickQuizMsg'); sendChatMessage()"
                class="px-3 py-2 bg-white rounded-button shadow-card text-sm font-medium text-primary hover:bg-primary-light transition-colors"
                x-text="t('chat.quickQuiz')"
              ></button>
              <button
                @click="chatInput = t('chat.quickFlashcardsMsg'); sendChatMessage()"
                class="px-3 py-2 bg-white rounded-button shadow-card text-sm font-medium text-primary hover:bg-primary-light transition-colors"
                x-text="t('chat.quickFlashcards')"
              ></button>
            </div>
          </div>

          <!-- Chat messages -->
          <div id="chat-messages" class="space-y-4 mb-4">
            <template x-for="(msg, i) in chatMessages" :key="i">
              <div
                class="rounded-card px-4 py-3 shadow-card chat-msg"
                :class="msg.role === 'user' ? 'chat-msg-user' : 'chat-msg-assistant'"
              >
                <div class="flex items-center gap-2 mb-1">
                  <span
                    class="text-xs font-bold uppercase tracking-wider chat-msg-label"
                    x-text="msg.role === 'user' ? t('chat.you') : t('chat.tutor')"
                  ></span>
                  <span
                    class="text-xs chat-msg-time"
                    x-text="new Date(msg.timestamp).toLocaleTimeString(dateLocale(), {hour:'2-digit', minute:'2-digit'})"
                  ></span>
                </div>
                <div
                  x-show="msg.role === 'assistant'"
                  class="text-body-sm chat-markdown"
                  x-html="renderMarkdown(msg.content)"
                ></div>
                <p
                  x-show="msg.role === 'user'"
                  class="text-body-sm whitespace-pre-wrap"
                  x-text="msg.content"
                ></p>
                <div
                  x-show="msg.generatedIds && msg.generatedIds.length > 0"
                  class="mt-2 pt-2 border-t chat-msg-border"
                >
                  <span class="text-xs font-semibold flex items-center gap-1 chat-msg-label">
                    <i data-lucide="sparkles" class="w-3 h-3"></i>
                    <span x-text="t('chat.generationTriggered')"></span>
                  </span>
                </div>
              </div>
            </template>
          </div>

          <!-- Loading indicator -->
          <div
            x-show="chatLoading"
            class="rounded-card px-4 py-3 shadow-card chat-msg chat-msg-assistant mb-4"
          >
            <div class="flex items-center gap-2 text-text-secondary">
              <span
                class="w-4 h-4 animate-spin rounded-full border-2 border-primary border-t-transparent"
              ></span>
              <span class="text-body-sm" x-text="t('chat.thinking')"></span>
            </div>
          </div>

          <!-- Input area — sticky bottom -->
          <div
            class="sticky bottom-0 z-10 -mx-4 lg:-mx-6 px-4 lg:px-6 py-3"
            style="background: linear-gradient(to top, var(--color-canvas) 70%, transparent)"
          >
            <div class="bg-white rounded-card shadow-card p-3 flex gap-2">
              <input
                x-model="chatInput"
                @keydown.enter="sendChatMessage()"
                class="flex-1 input-modern px-3 py-2 text-body-sm"
                :placeholder="t('chat.placeholder')"
                :disabled="chatLoading"
              />
              <button
                @click="sendChatMessage()"
                :disabled="!chatInput.trim() || chatLoading"
                class="min-w-[44px] min-h-[44px] bg-primary text-white rounded-button flex items-center justify-center btn-press focus-ring disabled:opacity-50"
              >
                <i data-lucide="send" class="w-5 h-5"></i>
              </button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
