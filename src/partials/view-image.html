<!-- ======================== ILLUSTRATIONS (IMAGE) ======================== -->
<div x-show="activeView === 'image'">
  <div class="flex items-center justify-between mb-4">
    <h2 class="font-heading font-bold text-xl title-gradient" x-text="t('image.heading')">
      Illustrations
    </h2>
    <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
    <button
      @click="generate('image')"
      :disabled="loading.image || sources.length === 0"
      class="px-4 min-h-touch rounded-button font-semibold text-body-sm flex items-center gap-2 btn-lift focus-ring bg-gen-image/10 text-gen-image hover:bg-gen-image/20 disabled:opacity-50"
    >
      <i x-show="!loading.image" data-lucide="plus" class="w-4 h-4"></i>
      <span
        x-show="loading.image"
        class="w-4 h-4 animate-spin rounded-full border-2 border-gen-image border-t-transparent"
      ></span>
      <span x-text="loading.image ? t('common.loading') : t('image.new')"></span>
    </button>
  </div>

  <!-- Empty state -->
  <div x-show="generationsByType('image').length === 0 && !loading.image" class="text-center py-12">
    <div
      class="w-16 h-16 mx-auto mb-3 bg-pink-50 rounded-[1rem] border border-gen-image/20 flex items-center justify-center"
    >
      <i data-lucide="image" class="w-8 h-8 text-gen-image"></i>
    </div>
    <p class="text-text-primary font-semibold mb-1" x-text="t('image.emptyTitle')"></p>
    <p
      class="text-text-secondary text-body-sm mb-4"
      x-text="sources.length === 0 ? t('common.noSourcesYet') : t('image.emptyWithSources')"
    ></p>
    <button
      x-show="sources.length === 0"
      @click="goToView('sources')"
      class="bg-accent text-white px-5 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring"
      x-text="t('common.addSources')"
    ></button>
  </div>

  <!-- Image cards — flat layout, no accordion -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <template x-for="gen in generationsByType('image')" :key="gen.id">
      <div class="gen-card border-l-4 border-l-gen-image animate-slide-up overflow-hidden">
        <!-- Image (click to lightbox) -->
        <img
          :src="gen.data.imageUrl"
          :alt="gen.title"
          class="w-full rounded-t-card cursor-pointer hover:opacity-90 transition-opacity"
          @click="openLightbox(gen.data.imageUrl)"
        />
        <!-- Info bar -->
        <div class="px-4 py-3">
          <div class="flex items-center gap-3">
            <span class="icon-chip icon-chip-image shrink-0">
              <i data-lucide="image" class="w-4 h-4 text-gen-image"></i>
            </span>
            <div class="flex-1 min-w-0">
              <template x-if="editingTitle !== gen.id">
                <span
                  class="font-semibold text-body-sm text-text-primary truncate block"
                  x-text="gen.title"
                  @dblclick="startEditTitle(gen)"
                ></span>
              </template>
              <template x-if="editingTitle === gen.id">
                <input
                  x-model="editTitleValue"
                  @click.stop
                  @keydown.enter="saveTitle(gen)"
                  @keydown.escape="editingTitle = null"
                  @blur="saveTitle(gen)"
                  class="w-full border-2 border-primary rounded-button px-2 py-0.5 text-body-sm focus-ring"
                  x-ref="titleInput"
                />
              </template>
              <span
                class="text-sm text-text-secondary"
                x-text="new Date(gen.createdAt).toLocaleTimeString(dateLocale())"
              ></span>
            </div>
            <!-- Actions -->
            <button
              @click.stop="startEditTitle(gen)"
              class="min-w-[32px] min-h-[32px] flex items-center justify-center text-text-secondary hover:text-primary focus-ring rounded"
              :aria-label="t('common.rename')"
            >
              <i data-lucide="pencil" class="w-4 h-4"></i>
            </button>
            <button
              @click.stop="confirmDelete('generation', () => deleteGen(gen))"
              class="min-w-[32px] min-h-[32px] flex items-center justify-center text-text-secondary hover:text-danger focus-ring rounded"
              :aria-label="t('common.delete')"
            >
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
          <!-- Prompt (collapsed by default) -->
          <details class="mt-3 bg-surface rounded-card border border-gray-100">
            <summary
              class="px-3 py-2 text-sm text-text-secondary cursor-pointer flex items-center gap-2 hover:bg-gray-50 rounded-card"
            >
              <i data-lucide="message-square" class="w-4 h-4 shrink-0"></i>
              <span x-text="t('image.prompt')"></span>
            </summary>
            <p class="px-3 pb-3 text-sm text-text-secondary italic" x-text="gen.data.prompt"></p>
          </details>
          <!-- Ref. sources -->
          <div
            x-show="gen.sourceIds && gen.sourceIds.length > 0"
            class="flex flex-wrap items-center gap-2 mt-3 pt-3 border-t border-gray-100"
          >
            <span class="text-sm text-text-secondary flex items-center gap-1">
              <i data-lucide="book-open" class="w-3.5 h-3.5"></i>
              <span x-text="t('common.sources') + ' :'"></span>
            </span>
            <template x-for="(src, srcIdx) in genSources(gen)" :key="src.id">
              <button
                @click.stop="openSourceDialog(src)"
                :class="['source-badge', !isSourceReferenced(gen, srcIdx) && 'source-badge-dim']"
                :title="src.filename"
                x-text="srcIdx + 1"
              ></button>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>
</div>
