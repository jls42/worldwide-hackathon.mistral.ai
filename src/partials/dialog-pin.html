<dialog x-ref="pinDialog" class="rounded-dialog p-6 max-w-sm w-full shadow-float glass">
  <div class="text-center">
    <div
      class="w-14 h-14 mx-auto mb-3 bg-amber-50 rounded-[1rem] border border-amber-200 flex items-center justify-center"
    >
      <i data-lucide="shield" class="w-7 h-7 text-amber-500"></i>
    </div>
    <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
    <h2
      class="font-heading font-bold text-lg text-text-primary mb-2"
      x-text="t('profile.pinVerify')"
    >
      Verify PIN
    </h2>
    <p class="text-body-sm text-text-secondary mb-4" x-text="t('profile.pinInfo')"></p>
    <input
      type="password"
      inputmode="numeric"
      maxlength="4"
      x-model="pinVerifyInput"
      @keydown.enter="submitPinVerify()"
      class="input-modern w-full px-3 py-2 mb-4 text-center text-lg tracking-[0.5em] font-mono"
      :placeholder="t('profile.pinPlaceholder')"
      autocomplete="off"
    />
    <div class="flex gap-2">
      <button
        @click="closePinDialog()"
        class="flex-1 min-h-touch rounded-button font-semibold text-body-sm bg-gray-100 text-text-secondary hover:bg-gray-200 transition-colors card-lift btn-press focus-ring"
        x-text="t('common.cancel')"
      ></button>
      <button
        @click="submitPinVerify()"
        :disabled="!/^\d{4}$/.test(pinVerifyInput)"
        class="flex-1 min-h-touch rounded-button font-semibold text-body-sm bg-primary text-white hover:bg-primary/90 transition-colors card-lift btn-press focus-ring disabled:opacity-50"
        x-text="t('common.save')"
      ></button>
    </div>
  </div>
</dialog>
