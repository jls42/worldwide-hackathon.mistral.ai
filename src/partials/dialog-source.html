<!-- ================================================================ -->
<!-- DIALOG: Source viewer -->
<!-- ================================================================ -->
<dialog
  x-ref="sourceDialog"
  class="rounded-dialog p-0 w-full max-h-[85vh] shadow-float glass"
  :class="(viewSourceMode === 'compare' && !viewSourceCompareVertical) || viewSourceZoom > 1 ? 'max-w-5xl' : 'max-w-2xl'"
>
  <template x-if="viewSource">
    <div class="flex flex-col max-h-[85vh]">
      <!-- Header -->
      <div class="flex items-center gap-3 px-5 py-4 border-b border-gray-200/60 shrink-0">
        <span
          class="w-9 h-9 rounded-[0.7rem] flex items-center justify-center shrink-0"
          :class="sourceTypeBadgeColor(viewSource)"
        >
          <i :data-lucide="sourceTypeIcon(viewSource)" class="w-4.5 h-4.5"></i>
        </span>
        <div class="flex-1 min-w-0">
          <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
          <h3
            class="font-heading font-bold text-text-primary text-body-sm truncate"
            x-text="viewSource.filename"
          >
            Source
          </h3>
          <div class="flex items-center gap-2 mt-0.5">
            <span
              class="text-xs text-text-secondary"
              x-text="new Date(viewSource.uploadedAt).toLocaleString(dateLocale(), {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'})"
            ></span>
            <span
              class="text-xs px-2 py-0.5 rounded-badge font-semibold"
              :class="sourceTypeBadgeColor(viewSource)"
              x-text="sourceTypeBadge(viewSource)"
            ></span>
          </div>
        </div>
        <button
          @click="closeSourceDialog()"
          class="min-w-[44px] min-h-[44px] flex items-center justify-center text-text-secondary hover:text-text-primary focus-ring rounded-button"
          :aria-label="t('common.close')"
        >
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Mode bar (OCR sources only) -->
      <div
        x-show="isOcrSource(viewSource)"
        class="flex items-center gap-1 px-5 py-2.5 border-b border-gray-100 bg-gray-50 shrink-0"
      >
        <button
          @click="viewSourceMode = 'ocr'"
          class="px-3.5 py-1.5 rounded-badge text-sm font-semibold transition-colors focus-ring"
          :class="viewSourceMode === 'ocr' ? 'bg-primary text-white' : 'text-text-secondary hover:bg-gray-200'"
        >
          <span class="flex items-center gap-1.5"
            ><i data-lucide="file-text" class="w-3.5 h-3.5"></i>
            <span x-text="t('sourceDialog.ocrText')"></span
          ></span>
        </button>
        <button
          x-show="getOriginalFileUrl(viewSource)"
          @click="viewSourceMode = 'original'"
          class="px-3.5 py-1.5 rounded-badge text-sm font-semibold transition-colors focus-ring"
          :class="viewSourceMode === 'original' ? 'bg-primary text-white' : 'text-text-secondary hover:bg-gray-200'"
        >
          <span class="flex items-center gap-1.5"
            ><i data-lucide="image" class="w-3.5 h-3.5"></i>
            <span x-text="t('sourceDialog.document')"></span
          ></span>
        </button>
        <button
          x-show="getOriginalFileUrl(viewSource) && !isMobile"
          @click="viewSourceMode = 'compare'"
          class="hidden sm:inline-flex px-3.5 py-1.5 rounded-badge text-sm font-semibold transition-colors focus-ring"
          :class="viewSourceMode === 'compare' ? 'bg-primary text-white' : 'text-text-secondary hover:bg-gray-200'"
        >
          <span class="flex items-center gap-1.5"
            ><i data-lucide="columns" class="w-3.5 h-3.5"></i>
            <span x-text="t('sourceDialog.compare')"></span
          ></span>
        </button>
        <button
          x-show="viewSourceMode === 'compare'"
          @click="viewSourceCompareVertical = !viewSourceCompareVertical; $nextTick(() => refreshIcons())"
          class="ml-auto min-w-[36px] min-h-[36px] flex items-center justify-center rounded-badge text-text-secondary hover:bg-gray-200 focus-ring"
          :title="viewSourceCompareVertical ? t('sourceDialog.layoutHorizontal') : t('sourceDialog.layoutVertical')"
        >
          <i :data-lucide="viewSourceCompareVertical ? 'columns-2' : 'rows-2'" class="w-4 h-4"></i>
        </button>
      </div>

      <!-- Zoom/Rotation toolbar (images only, in original or compare mode) -->
      <div
        x-show="isOcrSource(viewSource) && isImageFile(viewSource.filename) && (viewSourceMode === 'original' || viewSourceMode === 'compare')"
        class="flex items-center justify-center gap-1 px-5 py-2 border-b border-gray-100 bg-gray-50/30 shrink-0"
      >
        <button
          @click="zoomOut()"
          class="min-w-[36px] min-h-[36px] flex items-center justify-center rounded-button text-text-secondary hover:bg-gray-200 focus-ring"
          :title="t('sourceDialog.zoomOut')"
        >
          <i data-lucide="zoom-out" class="w-4 h-4"></i>
        </button>
        <span
          class="text-sm font-semibold text-text-primary min-w-[3rem] text-center"
          x-text="Math.round(viewSourceZoom * 100) + '%'"
        ></span>
        <button
          @click="zoomIn()"
          class="min-w-[36px] min-h-[36px] flex items-center justify-center rounded-button text-text-secondary hover:bg-gray-200 focus-ring"
          :title="t('sourceDialog.zoomIn')"
        >
          <i data-lucide="zoom-in" class="w-4 h-4"></i>
        </button>
        <button
          @click="resetZoom()"
          class="min-w-[36px] min-h-[36px] flex items-center justify-center rounded-button text-text-secondary hover:bg-gray-200 focus-ring"
          :title="t('sourceDialog.reset')"
        >
          <i data-lucide="maximize-2" class="w-4 h-4"></i>
        </button>
        <span class="w-px h-5 bg-gray-300 mx-1"></span>
        <button
          @click="rotateLeft()"
          class="min-w-[36px] min-h-[36px] flex items-center justify-center rounded-button text-text-secondary hover:bg-gray-200 focus-ring"
          :title="t('sourceDialog.rotateLeft')"
        >
          <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
        </button>
        <button
          @click="rotateRight()"
          class="min-w-[36px] min-h-[36px] flex items-center justify-center rounded-button text-text-secondary hover:bg-gray-200 focus-ring"
          :title="t('sourceDialog.rotateRight')"
        >
          <i data-lucide="rotate-cw" class="w-4 h-4"></i>
        </button>
      </div>

      <!-- Body -->
      <div class="overflow-y-auto flex-1 min-h-0 p-5">
        <!-- Mode: OCR text (default for all types) -->
        <div x-show="viewSourceMode === 'ocr' || !isOcrSource(viewSource)">
          <div class="bg-gray-50 rounded-card p-4">
            <div
              class="prose prose-sm max-w-none text-body-sm text-text-primary whitespace-pre-wrap leading-relaxed"
              x-text="viewSource.markdown"
            ></div>
          </div>
        </div>

        <!-- Mode: Original document -->
        <div
          x-show="viewSourceMode === 'original' && isOcrSource(viewSource) && getOriginalFileUrl(viewSource)"
        >
          <template x-if="isImageFile(viewSource.filename)">
            <div
              class="relative overflow-hidden rounded-card bg-gray-100"
              @mousedown="startDrag($event)"
              @mousemove="onDrag($event)"
              @mouseup="stopDrag()"
              @mouseleave="stopDrag()"
              @touchstart="startDrag($event)"
              @touchmove="onDrag($event)"
              @touchend="stopDrag()"
            >
              <img
                :src="getOriginalFileUrl(viewSource)"
                :alt="viewSource.filename"
                class="shadow-card mx-auto max-w-full max-h-[60vh] select-none"
                :class="[(viewSourceZoom > 1 || viewSourceRotation % 360 !== 0) ? (viewSourceDragging ? 'cursor-grabbing' : 'cursor-grab') : '', viewSourceDragging ? '' : 'transition-transform duration-300']"
                :style="'transform: translate(' + viewSourcePanX + 'px, ' + viewSourcePanY + 'px) scale(' + viewSourceZoom + ') rotate(' + viewSourceRotation + 'deg); transform-origin: center'"
                draggable="false"
              />
            </div>
          </template>
          <template x-if="isPdfFile(viewSource.filename)">
            <iframe
              :src="getOriginalFileUrl(viewSource)"
              title="Document"
              class="w-full rounded-card shadow-card border-0"
              style="min-height: 60vh"
            ></iframe>
          </template>
        </div>

        <!-- Mode: Compare (desktop only) -->
        <div
          x-show="viewSourceMode === 'compare' && isOcrSource(viewSource) && getOriginalFileUrl(viewSource)"
        >
          <div
            :class="viewSourceCompareVertical ? 'flex flex-col gap-4' : 'grid grid-cols-2 gap-4'"
          >
            <div>
              <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
              <h4
                class="font-heading font-semibold text-sm text-text-secondary mb-2 flex items-center gap-1.5"
              >
                <i data-lucide="image" class="w-4 h-4"></i>
                <span x-text="t('sourceDialog.originalDoc')">Original</span>
              </h4>
              <div
                class="bg-gray-50 rounded-card p-2 relative overflow-hidden"
                @mousedown="startDrag($event)"
                @mousemove="onDrag($event)"
                @mouseup="stopDrag()"
                @mouseleave="stopDrag()"
                @touchstart="startDrag($event)"
                @touchmove="onDrag($event)"
                @touchend="stopDrag()"
              >
                <template x-if="isImageFile(viewSource.filename)">
                  <img
                    :src="getOriginalFileUrl(viewSource)"
                    :alt="viewSource.filename"
                    class="max-w-full max-h-[40vh] select-none"
                    :class="[(viewSourceZoom > 1 || viewSourceRotation % 360 !== 0) ? (viewSourceDragging ? 'cursor-grabbing' : 'cursor-grab') : '', viewSourceDragging ? '' : 'transition-transform duration-300']"
                    :style="'transform: translate(' + viewSourcePanX + 'px, ' + viewSourcePanY + 'px) scale(' + viewSourceZoom + ') rotate(' + viewSourceRotation + 'deg); transform-origin: center'"
                    draggable="false"
                  />
                </template>
                <template x-if="isPdfFile(viewSource.filename)">
                  <iframe
                    :src="getOriginalFileUrl(viewSource)"
                    title="Document"
                    class="w-full rounded-card border-0"
                    style="min-height: 50vh"
                  ></iframe>
                </template>
              </div>
            </div>
            <div>
              <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
              <h4
                class="font-heading font-semibold text-sm text-text-secondary mb-2 flex items-center gap-1.5"
              >
                <i data-lucide="file-text" class="w-4 h-4"></i>
                <span x-text="t('sourceDialog.extractedText')">Extracted text</span>
              </h4>
              <div class="bg-gray-50 rounded-card p-4 overflow-y-auto max-h-[40vh]">
                <div
                  class="prose prose-sm max-w-none text-body-sm text-text-primary whitespace-pre-wrap leading-relaxed"
                  x-text="viewSource.markdown"
                ></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Legacy: no filePath for OCR sources -->
        <div
          x-show="isOcrSource(viewSource) && !getOriginalFileUrl(viewSource) && viewSourceMode !== 'ocr'"
          class="text-center py-8"
        >
          <div
            class="w-14 h-14 mx-auto mb-3 bg-gray-100 rounded-[1rem] flex items-center justify-center"
          >
            <i data-lucide="image-off" class="w-7 h-7 text-text-secondary"></i>
          </div>
          <p
            class="text-text-secondary text-body-sm"
            x-text="t('sourceDialog.legacyNotAvailable')"
          ></p>
          <p class="text-text-secondary text-sm mt-1" x-text="t('sourceDialog.legacyHint')"></p>
        </div>
      </div>
    </div>
  </template>
</dialog>
