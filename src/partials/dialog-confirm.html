<dialog x-ref="confirmDialog" class="rounded-dialog p-6 max-w-sm w-full shadow-float glass">
  <div class="text-center">
    <div
      class="w-14 h-14 mx-auto mb-3 bg-danger-light rounded-[1rem] border border-danger/20 flex items-center justify-center"
    >
      <i data-lucide="alert-triangle" class="w-7 h-7 text-danger"></i>
    </div>
    <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
    <h2 class="font-heading font-bold text-lg text-text-primary mb-2" x-text="t('confirm.title')">
      Confirm
    </h2>
    <p
      class="text-body-sm text-text-secondary mb-4"
      x-text="t('confirm.message', { target: confirmTarget })"
    ></p>
    <div class="flex gap-2">
      <button
        @click="closeConfirmDialog()"
        class="flex-1 min-h-touch rounded-button font-semibold text-body-sm bg-gray-100 text-text-secondary hover:bg-gray-200 transition-colors card-lift btn-press focus-ring"
        x-text="t('common.cancel')"
      ></button>
      <button
        @click="executeConfirm()"
        class="flex-1 min-h-touch rounded-button font-semibold text-body-sm bg-danger-dark text-white hover:bg-danger-dark/90 transition-colors card-lift btn-press focus-ring"
        x-text="t('common.delete')"
      ></button>
    </div>
  </div>
</dialog>
