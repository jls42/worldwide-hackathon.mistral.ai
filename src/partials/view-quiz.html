<!-- ======================== QUIZ ======================== -->
<div x-show="activeView === 'quiz'">
  <div class="flex items-center justify-between mb-4">
    <h2 class="font-heading font-bold text-xl title-gradient" x-text="t('quiz.heading')">Quiz</h2>
    <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
    <button
      @click="generate('quiz')"
      :disabled="loading.quiz || sources.length === 0"
      class="px-4 min-h-touch rounded-button font-semibold text-body-sm flex items-center gap-2 btn-lift focus-ring bg-gen-quiz/10 text-gen-quiz hover:bg-gen-quiz/20 disabled:opacity-50"
    >
      <i x-show="!loading.quiz" data-lucide="plus" class="w-4 h-4"></i>
      <span
        x-show="loading.quiz"
        class="w-4 h-4 animate-spin rounded-full border-2 border-gen-quiz border-t-transparent"
      ></span>
      <span x-text="loading.quiz ? t('common.loading') : t('quiz.new')"></span>
    </button>
  </div>

  <div x-show="generationsByType('quiz').length === 0 && !loading.quiz" class="text-center py-12">
    <div
      class="w-16 h-16 mx-auto mb-3 bg-purple-50 rounded-[1rem] border border-gen-quiz/20 flex items-center justify-center"
    >
      <i data-lucide="brain" class="w-8 h-8 text-gen-quiz"></i>
    </div>
    <p class="text-text-primary font-semibold mb-1" x-text="t('quiz.emptyTitle')"></p>
    <p
      class="text-text-secondary text-body-sm mb-4"
      x-text="sources.length === 0 ? t('common.noSourcesYet') : t('quiz.emptyWithSources')"
    ></p>
    <button
      x-show="sources.length === 0"
      @click="goToView('sources')"
      class="bg-accent text-white px-5 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring"
      x-text="t('common.addSources')"
    ></button>
  </div>

  <div class="space-y-3">
    <template x-for="gen in generationsByType('quiz')" :key="gen.id">
      <div class="gen-card border-l-4 border-l-gen-quiz animate-slide-up">
        <button
          @click="toggleGen(gen.id)"
          class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors focus-ring text-left"
          :aria-expanded="openGens[gen.id] ? 'true' : 'false'"
        >
          <span class="icon-chip icon-chip-quiz shrink-0"
            ><i data-lucide="brain" class="w-4 h-4 text-gen-quiz"></i
          ></span>
          <div class="flex-1 min-w-0">
            <template x-if="editingTitle !== gen.id">
              <span
                class="font-semibold text-body-sm text-text-primary truncate block"
                x-text="gen.title"
                @dblclick.stop="startEditTitle(gen)"
              ></span>
            </template>
            <template x-if="editingTitle === gen.id">
              <input
                x-model="editTitleValue"
                @click.stop
                @keydown.enter="saveTitle(gen)"
                @keydown.escape="editingTitle = null"
                @blur="saveTitle(gen)"
                class="w-full border-2 border-primary rounded-button px-2 py-0.5 text-body-sm focus-ring"
                x-ref="titleInput"
              />
            </template>
            <span
              class="text-sm text-text-secondary"
              x-text="new Date(gen.createdAt).toLocaleTimeString(dateLocale())"
            ></span>
          </div>
          <template x-if="gen.stats && gen.stats.attempts.length > 0">
            <span
              class="text-xs px-2.5 py-1 rounded-badge font-bold shrink-0"
              :class="gen.stats.attempts[gen.stats.attempts.length-1].score === gen.stats.attempts[gen.stats.attempts.length-1].total ? 'bg-success-light text-success-dark' : 'bg-warning-light text-warning-dark'"
              x-text="gen.stats.attempts[gen.stats.attempts.length-1].score + '/' + gen.stats.attempts[gen.stats.attempts.length-1].total"
            ></span>
          </template>
          <i
            data-lucide="chevron-down"
            class="w-5 h-5 text-text-secondary shrink-0 transition-transform"
            :class="openGens[gen.id] && 'rotate-180'"
          ></i>
        </button>
        <div x-show="openGens[gen.id]" x-transition class="px-4 pb-4 border-t border-gray-100">
          <div class="flex items-center gap-2 mt-3 mb-3 flex-wrap">
            <div class="flex-1"></div>
            <button
              @click.stop="startEditTitle(gen)"
              class="min-w-[32px] min-h-[32px] flex items-center justify-center text-text-secondary hover:text-primary focus-ring rounded"
              :aria-label="t('common.rename')"
            >
              <i data-lucide="pencil" class="w-4 h-4"></i>
            </button>
            <button
              @click.stop="confirmDelete('generation', () => deleteGen(gen))"
              class="min-w-[32px] min-h-[32px] flex items-center justify-center text-text-secondary hover:text-danger focus-ring rounded"
              :aria-label="t('common.delete')"
            >
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
          <div x-data="quizComponent(gen)" x-init="initQuiz()">
            <div
              x-show="gen.stats && gen.stats.attempts.length > 0"
              class="mb-4 flex flex-wrap gap-2"
            >
              <template x-for="(att, ai) in (gen.stats?.attempts || [])" :key="ai">
                <span
                  class="text-sm px-2.5 py-1 rounded-badge font-semibold"
                  :class="att.score === att.total ? 'bg-success-light text-success-dark' : 'bg-gray-100 text-text-secondary'"
                  x-text="'T' + (ai+1) + ': ' + att.score + '/' + att.total"
                ></span>
              </template>
            </div>
            <div class="space-y-4">
              <template x-for="(q, qi) in questions()" :key="qi">
                <div class="bg-gray-50 rounded-card p-4">
                  <p
                    class="font-heading font-semibold text-body-sm mb-3 text-text-primary"
                    x-text="'Q' + (qi+1) + '. ' + q.question"
                  ></p>
                  <div class="space-y-2">
                    <template x-for="(choice, ci) in q.choices" :key="ci">
                      <button
                        class="w-full text-left px-4 py-3 rounded-button text-body-sm border-2 transition-all btn-press focus-ring"
                        :class="{
                                    'border-success bg-success-light font-semibold text-success-dark': answers[qi] !== undefined && ci === q.correct,
                                    'border-danger bg-danger-light text-danger-dark': answers[qi] === ci && ci !== q.correct,
                                    'border-gray-200 bg-surface hover:border-primary': answers[qi] === undefined
                                  }"
                        @click="answer(qi, ci)"
                        :disabled="answers[qi] !== undefined"
                        x-text="choice"
                      ></button>
                    </template>
                  </div>
                  <div
                    x-show="answers[qi] !== undefined"
                    class="mt-3 bg-accent-light rounded-button p-3"
                  >
                    <p class="text-body-sm text-accent-dark" x-text="q.explanation"></p>
                    <div
                      x-show="questionSources(gen, q).length > 0"
                      class="flex flex-wrap items-center gap-1.5 mt-2 pt-2 border-t border-accent/20"
                    >
                      <span class="text-xs text-accent-dark/70 flex items-center gap-1"
                        ><i data-lucide="book-open" class="w-3 h-3"></i>
                        <span x-text="t('quiz.verify')"></span
                      ></span>
                      <template x-for="src in questionSources(gen, q)" :key="src.id">
                        <button
                          @click.stop="openSourceDialog(src)"
                          class="source-badge text-[0.65em]"
                          :title="src.filename"
                          x-text="sources.indexOf(src) + 1"
                        ></button>
                      </template>
                    </div>
                  </div>
                </div>
              </template>
            </div>
            <div x-show="allAnswered()" class="mt-6 text-center">
              <div
                class="inline-block px-8 py-4 rounded-card"
                :class="score() === questions().length ? 'bg-success-light' : 'bg-warning-light'"
              >
                <p
                  class="font-heading font-bold text-2xl"
                  :class="score() === questions().length ? 'text-success-dark' : 'text-warning-dark'"
                >
                  <span x-text="score()"></span> / <span x-text="questions().length"></span>
                </p>
                <p
                  class="text-body-sm font-medium"
                  :class="score() === questions().length ? 'text-success-dark' : 'text-warning-dark'"
                  x-text="score() === questions().length ? t('quiz.perfect') : t('quiz.keepGoing')"
                ></p>
              </div>
              <div class="flex gap-3 justify-center mt-4 flex-wrap">
                <button
                  x-show="!submitted"
                  @click="submitAttempt()"
                  class="bg-primary-dark text-white px-5 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring"
                  x-text="t('quiz.saveScore')"
                ></button>
                <button
                  x-show="submitted && score() < questions().length"
                  @click="reviewErrors()"
                  :disabled="reviewing"
                  class="bg-warning-dark text-white px-5 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring disabled:opacity-50"
                >
                  <span x-show="!reviewing" x-text="t('quiz.reviewErrors')"></span>
                  <span x-show="reviewing" class="flex items-center gap-2"
                    ><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                    <span x-text="t('common.generating')"></span
                  ></span>
                </button>
                <button
                  @click="resetQuiz()"
                  class="bg-gray-200 text-text-primary px-5 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring"
                  x-text="t('quiz.restart')"
                ></button>
              </div>
            </div>
            <div
              x-show="gen.sourceIds && gen.sourceIds.length > 0"
              class="flex flex-wrap items-center gap-2 mt-3 pt-3 border-t border-gray-100"
            >
              <span class="text-sm text-text-secondary flex items-center gap-1">
                <i data-lucide="book-open" class="w-3.5 h-3.5"></i>
                <span x-text="t('common.sources') + ' :'"></span>
              </span>
              <template x-for="(src, srcIdx) in genSources(gen)" :key="src.id">
                <button
                  @click.stop="openSourceDialog(src)"
                  :class="['source-badge', !isSourceReferenced(gen, srcIdx) && 'source-badge-dim']"
                  :title="src.filename"
                  x-text="srcIdx + 1"
                ></button>
              </template>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>
</div>
